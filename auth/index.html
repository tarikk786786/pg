<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Dezo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 12px;
        }

        .auth-links {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-links a:hover {
            color: var(--text-color);
        }

        .auth-footer {
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="auth-container glass-panel">
        <a href="../index.html" class="auth-logo">
            <div class="logo-icon"><i class="bi bi-lightning-charge-fill"></i></div>
            Dezo
        </a>
        
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your Dezo account</p>

        <form action="#" method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="you@company.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="/auth/register">Sign up</a></p>
            <p style="margin-top: 8px;"><a href="#">Forgot your password?</a></p>
        </div>

        <div class="auth-footer">
            Developer By <a href="https://tarikislam.in" target="_blank" style="color: var(--text-muted); text-decoration: underline;">tarikislam.in</a> | Made in India
        </div>
    </div>

</body>
</html>
